seed: 42

data:
  root: data/PASTIS
  train_folds: [1, 2, 3]
  val_folds: [4]
  test_folds: [5]
  temporal_aggregation: monthly
  selected_timesteps: 12
  monthly_start_offset: 1
  source_image_size: 128
  tile_size: 64
  image_size: 64
  num_classes: 19
  target_channel: 0
  void_label: 19
  ignore_index: -1
  normalization: galileo_norm_no_clip
  normalization_std_multiplier: 2.0
  batch_size: 128
  num_workers: 4

encoder:
  name: galileo-base-patch8
  checkpoint: pretrained/galileo-base-patch8
  patch_size: 4
  freeze: true
  normalize: false
  local_files_only: true
  output_hidden_states: false
  spatial_token_strategy: spacetime_mean
  hidden_layers: [3, 6, 9, 12]
  hidden_size: null

model:
  decoder: linear_probe
  output_patch_size: 4

loss:
  name: ce
  ce_weight: 1.0
  dice_weight: 0.0
  ignore_index: -1

optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.01

scheduler:
  name: warmup_cosine
  warmup_epochs: 5
  min_lr: 0.00001

train:
  epochs: 50
  amp: true
  amp_dtype: bfloat16
  log_dir: logs/galileo_linear_probe_lr1e-3_seed42
  checkpoint_dir: checkpoints/galileo_linear_probe_lr1e-3_seed42
  save_best: true
  save_last: true
  early_stopping:
    enabled: false
