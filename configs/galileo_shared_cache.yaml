seed: 42

data:
  root: data/PASTIS
  train_folds: [1, 2, 3]
  val_folds: [4]
  test_folds: [5]
  temporal_aggregation: monthly
  selected_timesteps: 12
  monthly_start_offset: 1
  source_image_size: 128
  tile_size: 64
  image_size: 64
  num_classes: 19
  target_channel: 0
  void_label: 19
  ignore_index: -1
  normalization: galileo_norm_no_clip
  normalization_std_multiplier: 2.0
  batch_size: 2
  num_workers: 0

encoder:
  name: galileo-base-patch8
  checkpoint: pretrained/galileo-base-patch8
  patch_size: 4
  freeze: true
  normalize: false
  local_files_only: true
  output_hidden_states: false
  spatial_token_strategy: spacetime_mean
  hidden_layers: [3, 6, 9, 12]
  hidden_size: null

model:
  decoder: single_layer_dpt
  decoder_channels: 256
  decoder_blocks: 3
  dropout: 0.1

loss:
  name: ce_dice
  ce_weight: 1.0
  dice_weight: 0.5
  ignore_index: -1

optimizer:
  name: prodigy
  lr: 1.0
  weight_decay: 0.1
  decouple: true
  slice_p: 11

scheduler:
  name: none

train:
  epochs: 100
  amp: false
  log_dir: logs/galileo_decoder_compare_paper_input
  checkpoint_dir: checkpoints/galileo_decoder_compare_paper_input
  save_best: true
