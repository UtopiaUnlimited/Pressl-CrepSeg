seed: 42

data:
  root: data/PASTIS
  train_folds: [1, 2, 3]
  val_folds: [4]
  test_folds: [5]
  temporal_aggregation: monthly
  selected_timesteps: 12
  monthly_start_offset: 1
  source_image_size: 128
  tile_size: 64
  image_size: 64
  num_classes: 19
  target_channel: 0
  void_label: 19
  ignore_index: -1
  normalization: galileo_norm_no_clip
  normalization_std_multiplier: 2.0
  batch_size: 32
  num_workers: 4

cache:
  format: temporal_v2
  temporal_dtype: float16

encoder:
  name: galileo-base-patch8
  checkpoint: pretrained/galileo-base-patch8
  patch_size: 4
  freeze: true
  normalize: false
  local_files_only: true
  output_hidden_states: false
  spatial_token_strategy: spacetime_mean
  hidden_layers: [3, 6, 9, 12]
  hidden_size: null

model:
  decoder: temporal_readout_upernet
  decoder_channels: 256
  ppm_channels: 64
  ppm_scales: [1, 2, 3, 6]
  dropout: 0.1
  temporal_readout:
    num_months: 12
    hidden_channels: 192
    dropout: 0.1

loss:
  name: ce_dice
  ce_weight: 1.0
  dice_weight: 0.5
  ignore_index: -1

optimizer:
  name: prodigy
  lr: 1.0
  weight_decay: 0.1
  decouple: true
  slice_p: 11

scheduler:
  name: none

train:
  epochs: 100
  amp: false
  log_dir: logs/galileo_upernet_temporal_readout_seed42
  checkpoint_dir: checkpoints/galileo_upernet_temporal_readout_seed42
  save_best: true
  early_stopping:
    enabled: false
    monitor: val_miou
    mode: max
    patience: 12
    min_delta: 0.001
    start_epoch: 10
