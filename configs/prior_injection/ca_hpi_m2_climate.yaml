run_suffix: ca_hpi_m2_era5_land_v1

prior_injection:
  enabled: true
  method: ca_hpi
  token_dim: 128

  sources:
    - name: m2_era5_land
      kind: climate_table
      path: data/priors/era5_land_pastis_cropyear_v1.csv
      stats_path: data/priors/era5_land_pastis_cropyear_v1_stats.json
      features: [t2m_c, tp_mm, ssrd_mj_m2, swvl1]
      patch_id_column: patch_id
      month_column: month
      valid_column: valid
      confidence_column: confidence
      allow_missing_patch: false

  encoder:
    hidden_dim: 128
    time_frequencies: 4
    dropout: 0.0

  fusion:
    attention_dim: 128
    num_heads: 4
    gate_hidden_dim: 128
    dropout: 0.1
    confidence_bias_scale: 1.0
    initial_strength: 0.0
    learnable_strength: true

  diagnostics:
    enabled: true
