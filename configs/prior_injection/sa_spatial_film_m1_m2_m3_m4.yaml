run_suffix: sa_spatial_film_m1_m2_m3_m4_v1

prior_injection:
  enabled: true
  method: source_aware_spatial_film
  token_dim: 128

  sources:
    - name: m1_phenology
      kind: phenology_table
      path: data/priors/pastis_ext_prior_v1.csv
      default_confidence: 1.0
      confidence_mapping:
        high: 1.0
        medium: 0.7
        low: 0.4
    - name: m2_era5_land
      kind: climate_table
      path: data/priors/era5_land_pastis_cropyear_v1.csv
      stats_path: data/priors/era5_land_pastis_cropyear_v1_stats.json
      features: [t2m_c, tp_mm, ssrd_mj_m2, swvl1]
      allow_missing_patch: false
    - name: m3_soilgrids
      kind: soil_table
      path: data/priors/soilgrids_pastis_surface_v1.csv
      stats_path: data/priors/soilgrids_pastis_surface_v1_stats.json
      features: [ph, soc_gkg, clay_pct, sand_pct, cec_cmolkg, nitrogen_gkg]
      depths: ["0-5", "5-15", "15-30"]
      allow_missing_patch: false
    - name: m4_geography
      kind: patch_numeric_table
      path: data/priors/pastis_patch_locations_v1.csv
      stats_path: data/priors/pastis_patch_locations_v1_stats.json
      features: [lon, lat]
      allow_missing_patch: false

  encoder:
    hidden_dim: 128
    time_frequencies: 4
    dropout: 0.0

  fusion:
    attention_dim: 128
    num_heads: 4
    gate_hidden_dim: 128
    source_gate_hidden_dim: 128
    film_hidden_dim: 128
    dropout: 0.1
    confidence_bias_scale: 1.0
    source_balance_bias_scale: 1.0
    initial_gate_bias: -1.0
    initial_strength: 0.01
    learnable_strength: true

  diagnostics:
    enabled: true
