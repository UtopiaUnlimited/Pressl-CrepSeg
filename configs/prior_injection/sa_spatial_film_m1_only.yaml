run_suffix: sa_spatial_film_m1_only_v3

prior_injection:
  enabled: true
  method: source_aware_spatial_film
  token_dim: 128

  sources:
    - name: m1_phenology
      kind: phenology_table
      path: data/priors/pastis_ext_prior_v1.csv
      default_confidence: 1.0
      confidence_mapping:
        high: 1.0
        medium: 0.7
        low: 0.4

  encoder:
    hidden_dim: 128
    time_frequencies: 4
    dropout: 0.0

  fusion:
    attention_dim: 128
    num_heads: 4
    gate_hidden_dim: 128
    source_gate_hidden_dim: 128
    film_hidden_dim: 128
    dropout: 0.1
    confidence_bias_scale: 1.0
    source_balance_bias_scale: 1.0
    initial_gate_bias: -1.0
    initial_strength: 0.01
    learnable_strength: true

  diagnostics:
    enabled: true
