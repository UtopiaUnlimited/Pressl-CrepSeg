<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="660" viewBox="0 0 1600 660">
  <defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#F7FAFF"/><stop offset="1" stop-color="#EFFBFF"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#0F172A" flood-opacity=".12"/></filter></defs>
  <rect width="1600" height="660" rx="28" fill="url(#bg)"/>
  <g font-family="Microsoft YaHei, Arial, sans-serif" fill="#0F172A">
    <text x="70" y="68" font-size="29" font-weight="700" fill="#2563EB">PriorBatch：来源不同，但通过同一个可插拔接口进入</text>
    <g filter="url(#shadow)"><rect x="70" y="125" width="280" height="230" rx="20" fill="#fff" stroke="#BFDBFE" stroke-width="3"/><rect x="385" y="125" width="280" height="230" rx="20" fill="#fff" stroke="#BAE6FD" stroke-width="3"/><rect x="700" y="125" width="280" height="230" rx="20" fill="#fff" stroke="#A7F3D0" stroke-width="3"/><rect x="1015" y="125" width="280" height="230" rx="20" fill="#fff" stroke="#DDD6FE" stroke-width="3"/></g>
    <g font-size="26" font-weight="700" text-anchor="middle"><text x="210" y="180" fill="#2563EB">M1 物候</text><text x="525" y="180" fill="#0EA5E9">M2 气候</text><text x="840" y="180" fill="#059669">M3 土壤</text><text x="1155" y="180" fill="#7C3AED">M4 地理</text></g>
    <g font-size="20" fill="#475569" text-anchor="middle"><text x="210" y="225"><tspan x="210" dy="0">类别×月份</tspan><tspan x="210" dy="30">19×12 token</tspan><tspan x="210" dy="30">confidence</tspan></text><text x="525" y="225"><tspan x="525" dy="0">月度连续变量</tspan><tspan x="525" dy="30">温度/降水/辐射</tspan><tspan x="525" dy="30">valid mask</tspan></text><text x="840" y="225"><tspan x="840" dy="0">深度属性</tspan><tspan x="840" dy="30">3 depth / property</tspan><tspan x="840" dy="30">uncertainty</tspan></text><text x="1155" y="225"><tspan x="1155" dy="0">静态上下文</tspan><tspan x="1155" dy="30">标准化经纬度</tspan><tspan x="1155" dy="30">source id</tspan></text></g>
    <path d="M145 405H1455" stroke="#60A5FA" stroke-width="5" stroke-dasharray="12 12"/>
    <rect x="220" y="445" width="1160" height="130" rx="28" fill="#DBEAFE" stroke="#93C5FD" stroke-width="3"/>
    <text x="800" y="495" font-size="31" font-weight="700" fill="#1D4ED8" text-anchor="middle">PriorBatch = { tokens, mask, confidence, source_id }</text>
    <text x="800" y="540" font-size="22" fill="#475569" text-anchor="middle">不把来源差异抹平；把选择权交给融合模块</text>
  </g>
</svg>
