<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="700" viewBox="0 0 1600 700">
  <defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#F7FAFF"/><stop offset="1" stop-color="#EFFBFF"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#0F172A" flood-opacity=".12"/></filter></defs>
  <rect width="1600" height="700" rx="28" fill="url(#bg)"/>
  <g font-family="Microsoft YaHei, Arial, sans-serif" fill="#0F172A">
    <text x="80" y="68" font-size="29" font-weight="700" fill="#2563EB">两条路线回答同一个问题：不要过早固定平均时间</text>
    <rect x="75" y="110" width="650" height="470" rx="22" fill="#fff" stroke="#BFDBFE" stroke-width="3" filter="url(#shadow)"/>
    <rect x="875" y="110" width="650" height="470" rx="22" fill="#fff" stroke="#A7F3D0" stroke-width="3" filter="url(#shadow)"/>
    <rect x="105" y="140" width="250" height="48" rx="24" fill="#2563EB"/><text x="230" y="172" fill="#fff" font-size="26" font-weight="700" text-anchor="middle">Temporal Readout</text>
    <rect x="905" y="140" width="200" height="48" rx="24" fill="#0EA5E9"/><text x="1005" y="172" fill="#fff" font-size="26" font-weight="700" text-anchor="middle">3D-Aware</text>
    <g font-size="23" font-weight="700"><text x="115" y="245">每层、每个空间位置</text><text x="115" y="305">学习 12 个月权重</text><text x="115" y="365">→ 2D feature pyramid</text><text x="115" y="425">→ 任意 2D decoder</text></g>
    <g font-size="22" fill="#475569"><text x="115" y="485">通用性：后端 decoder 不需改</text><text x="115" y="525">研究价值：学习式时间读取接口</text></g>
    <g font-size="23" font-weight="700"><text x="915" y="245">保留 T 进入多层重组</text><text x="915" y="305">3D attention + 空间融合</text><text x="915" y="365">→ [B,T,C,64,64]</text><text x="915" y="425">→ query pooling → logits</text></g>
    <g font-size="22" fill="#475569"><text x="915" y="485">表达力：更晚压缩时间维</text><text x="915" y="525">结果：形成最强视觉基线</text></g>
    <path d="M730 345H860" stroke="#60A5FA" stroke-width="5" stroke-dasharray="12 12"/>
    <text x="800" y="330" font-size="20" fill="#64748B" text-anchor="middle">同一科研问题</text>
  </g>
</svg>
