<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Galileo 与物候知识先验旁路</title>
  <desc id="desc">纵向展示 PASTIS 时序输入、冻结 Galileo 编码器、物候知识旁路编码器、逐层残差注入、时间感知解码器和十九类分割输出。</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EA580C"/>
    </marker>
    <style>
      .title { font: 700 38px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #172033; }
      .subtitle { font: 500 21px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #64748B; }
      .section { font: 700 23px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #334155; }
      .box-title { font: 700 28px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #172033; }
      .body { font: 500 21px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .body-strong { font: 700 21px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #334155; }
      .shape { font: 700 21px Consolas, "Courier New", monospace; fill: #2563EB; }
      .shape-orange { font: 700 20px Consolas, "Courier New", monospace; fill: #C2410C; }
      .shape-green { font: 700 21px Consolas, "Courier New", monospace; fill: #047857; }
      .tag { font: 700 17px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .input { fill: #F8FAFC; stroke: #64748B; stroke-width: 3; }
      .main { fill: #EFF6FF; stroke: #3B82F6; stroke-width: 3; }
      .prior { fill: #FFF7ED; stroke: #F97316; stroke-width: 3; }
      .fusion { fill: #ECFDF5; stroke: #10B981; stroke-width: 3; }
      .decoder { fill: #F5F3FF; stroke: #7C3AED; stroke-width: 3; }
      .output { fill: #F0FDF4; stroke: #16A34A; stroke-width: 3; }
      .connector { fill: none; stroke: #475569; stroke-width: 4; marker-end: url(#arrow); }
      .prior-connector { fill: none; stroke: #EA580C; stroke-width: 4; marker-end: url(#arrow-orange); }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="1600" fill="#FFFFFF"/>

  <text x="600" y="55" text-anchor="middle" class="title">Galileo 与物候知识先验旁路</text>
  <text x="600" y="90" text-anchor="middle" class="subtitle">冻结视觉主干，可训练旁路与 Decoder</text>

  <!-- Main vertical path -->
  <rect x="390" y="125" width="420" height="125" rx="8" class="input"/>
  <text x="600" y="168" text-anchor="middle" class="box-title">PASTIS 多时相输入</text>
  <text x="600" y="213" text-anchor="middle" class="shape">[B, 12, 10, 64, 64]</text>
  <text x="600" y="238" text-anchor="middle" class="body">12 个月 · Sentinel-2</text>

  <path d="M 600 250 L 600 300" class="connector"/>

  <rect x="390" y="300" width="420" height="170" rx="8" class="main"/>
  <rect x="410" y="318" width="82" height="28" rx="6" fill="#DBEAFE"/>
  <text x="451" y="338" text-anchor="middle" class="tag">冻结</text>
  <text x="600" y="373" text-anchor="middle" class="box-title">Galileo Encoder</text>
  <text x="600" y="412" text-anchor="middle" class="body">空间、时间与波段组联合编码</text>
  <text x="600" y="448" text-anchor="middle" class="body-strong">block 3 / 6 / 9 / final</text>

  <path d="M 600 470 L 600 520" class="connector"/>

  <rect x="390" y="520" width="420" height="145" rx="8" class="main"/>
  <text x="600" y="562" text-anchor="middle" class="box-title">四层时序特征</text>
  <text x="600" y="607" text-anchor="middle" class="shape">[B, 4, 12, 768, 16, 16]</text>
  <text x="600" y="642" text-anchor="middle" class="body">时间维 T 完整保留</text>

  <path d="M 600 665 L 600 752" class="connector"/>

  <!-- Prior bypass -->
  <text x="40" y="315" class="section">知识先验旁路</text>

  <rect x="40" y="340" width="290" height="145" rx="8" class="prior"/>
  <text x="185" y="382" text-anchor="middle" class="box-title">物候先验 + 月份</text>
  <text x="185" y="426" text-anchor="middle" class="shape-orange">P_ext: [19, 12]</text>
  <text x="185" y="460" text-anchor="middle" class="shape-orange">months: [B, 12]</text>

  <path d="M 185 485 L 185 535" class="prior-connector"/>

  <rect x="40" y="535" width="290" height="175" rx="8" class="prior"/>
  <rect x="58" y="553" width="90" height="28" rx="6" fill="#FFEDD5"/>
  <text x="103" y="573" text-anchor="middle" class="tag">可训练</text>
  <text x="185" y="610" text-anchor="middle" class="box-title">旁路 Encoder</text>
  <text x="185" y="651" text-anchor="middle" class="body">19 → 128 → 768</text>
  <text x="185" y="684" text-anchor="middle" class="body">GELU + LayerNorm</text>

  <path d="M 185 710 L 185 760" class="prior-connector"/>

  <rect x="40" y="760" width="290" height="125" rx="8" class="prior"/>
  <text x="185" y="802" text-anchor="middle" class="box-title">先验残差</text>
  <text x="185" y="846" text-anchor="middle" class="shape-orange">[B, T, 768, 1, 1]</text>
  <text x="185" y="874" text-anchor="middle" class="body">四层共享 · 空间广播</text>

  <!-- Merge -->
  <circle cx="600" cy="800" r="48" fill="#ECFDF5" stroke="#10B981" stroke-width="4"/>
  <text x="600" y="813" text-anchor="middle" style="font: 700 43px Arial, sans-serif; fill:#047857;">+</text>
  <text x="600" y="875" text-anchor="middle" class="body-strong">逐层残差注入</text>

  <path d="M 330 823 L 547 806" class="prior-connector"/>
  <path d="M 600 848 L 600 920" class="connector"/>

  <rect x="390" y="920" width="420" height="130" rx="8" class="fusion"/>
  <text x="600" y="962" text-anchor="middle" class="box-title">先验增强特征</text>
  <text x="600" y="1005" text-anchor="middle" class="shape-green">[B, 4, 12, 768, 16, 16]</text>
  <text x="600" y="1035" text-anchor="middle" class="body">注入前后维度不变</text>

  <path d="M 600 1050 L 600 1100" class="connector"/>

  <!-- Decoder -->
  <rect x="260" y="1100" width="680" height="275" rx="8" class="decoder"/>
  <rect x="280" y="1118" width="90" height="28" rx="6" fill="#EDE9FE"/>
  <text x="325" y="1138" text-anchor="middle" class="tag">可训练</text>
  <text x="600" y="1170" text-anchor="middle" class="box-title">时间感知 Decoder</text>

  <rect x="290" y="1200" width="285" height="135" rx="8" fill="#FFFFFF" stroke="#A78BFA" stroke-width="2.5"/>
  <text x="432" y="1237" text-anchor="middle" class="body-strong">方案一至四</text>
  <text x="432" y="1275" text-anchor="middle" class="body">月份读出 T → 1</text>
  <text x="432" y="1310" text-anchor="middle" class="body">再进行 2D 空间解码</text>

  <rect x="625" y="1200" width="285" height="135" rx="8" fill="#FFFFFF" stroke="#A78BFA" stroke-width="2.5"/>
  <text x="768" y="1237" text-anchor="middle" class="body-strong">方案五</text>
  <text x="768" y="1275" text-anchor="middle" class="body">3D-Aware DPT 保留 T</text>
  <text x="768" y="1310" text-anchor="middle" class="body">输出前完成时间池化</text>

  <path d="M 600 1375 L 600 1425" class="connector"/>

  <rect x="390" y="1425" width="420" height="120" rx="8" class="output"/>
  <text x="600" y="1468" text-anchor="middle" class="box-title">19 类耕地分割</text>
  <text x="600" y="1512" text-anchor="middle" class="shape-green">[B, 19, 64, 64]</text>
  <text x="600" y="1575" text-anchor="middle" class="subtitle">固定：Galileo 与先验表　　训练：旁路 Encoder 与 Decoder</text>
</svg>
